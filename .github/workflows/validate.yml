name: gl-style-validate

on:
  push:
    branches:
      - master

jobs:
  build:
    name: Mapbox GL style validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install npm
      - name: Install mapbox-gl-style-spec
        run: npm i @mapbox/mapbox-gl-style-spec
      - name: Run mapbox-gl-style-spec
        run: find . -name style.json | while read FILE; do do echo "Validating $FILE"; npx gl-style-validate "$FILE"; done
